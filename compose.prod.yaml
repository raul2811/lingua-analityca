services:
  app:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/raul2811}/lingua-analytica:${IMAGE_TAG:-main}
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      STANFORD_URL: http://stanford:9000
      LINGUAKIT_URL: http://linguakit:3002
      LINGUAKIT_MODE: dep
      LINGUAKIT_OUTPUT: -a
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      - stanford
      - linguakit
    healthcheck:
      test: ["CMD", "/usr/local/bin/lingua-analytica", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    restart: unless-stopped

  stanford:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/raul2811}/lingua-analytica-stanford:${IMAGE_TAG:-main}
    environment:
      JAVA_XMX: ${STANFORD_JAVA_XMX:-4g}
      CORENLP_TIMEOUT: ${CORENLP_TIMEOUT:-15000}
      CORENLP_THREADS: ${CORENLP_THREADS:-2}
    expose:
      - "9000"
    ports:
      - "${STANFORD_PORT:-19000}:9000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider 'http://127.0.0.1:9000/?properties=%7B%22annotators%22%3A%22tokenize%2Cssplit%22%2C%22outputFormat%22%3A%22json%22%7D' --post-data='hola'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 5G
        reservations:
          cpus: "0.50"
          memory: 1G
    restart: unless-stopped

  linguakit:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/raul2811}/lingua-analytica-linguakit:${IMAGE_TAG:-main}
    environment:
      LINGUAKIT_LANG: ${LINGUAKIT_LANG:-es}
      LINGUAKIT_PORT: 3002
    expose:
      - "3002"
    ports:
      - "${LINGUAKIT_PORT_HOST:-3002}:3002"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "perl -MLWP::UserAgent -MJSON -e 'my $$ua=LWP::UserAgent->new(timeout=>5); my $$r=$$ua->post(\"http://127.0.0.1:3002/v2.0/dep\", Content_Type=>\"application/json\", Content=>encode_json({text=>\"hola\"})); exit($$r->is_success ? 0 : 1)'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped
